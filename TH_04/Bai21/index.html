<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài 2.1 - Form Đăng Ký</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 500px;
        margin: 20px auto;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
      }
      input[type="text"],
      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        outline: none;
      }
      /* Style cho trạng thái lỗi và thành công */
      .input-error {
        border: 2px solid red !important;
      }
      .input-success {
        border: 2px solid green !important;
      }
      .error-text {
        color: red;
        font-size: 0.9em;
        display: none;
        margin-top: 5px;
      }

      #successMessage {
        display: none;
        color: green;
        font-size: 1.2em;
        font-weight: bold;
        text-align: center;
        margin-top: 20px;
      }
      button {
        padding: 10px 20px;
        background-color: #007bff;
        color: white;
        border: none;
        cursor: pointer;
        width: 100%;
        font-size: 1em;
      }
      button:hover {
        background-color: #0056b3;
      }
    </style>
  </head>
  <body>
    <h2 id="formTitle">Đăng ký tài khoản</h2>

    <div id="successMessage">
      Đăng ký thành công! 🎉 <br /><span id="registeredName"></span>
    </div>

    <form id="registerForm">
      <div class="form-group">
        <label for="fullname">Họ và tên</label>
        <input type="text" id="fullname" placeholder="Nhập họ và tên" />
        <span id="fullnameError" class="error-text"></span>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="name@domain.com" />
        <span id="emailError" class="error-text"></span>
      </div>

      <div class="form-group">
        <label for="phone">Số điện thoại</label>
        <input type="text" id="phone" placeholder="Nhập số điện thoại" />
        <span id="phoneError" class="error-text"></span>
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" placeholder="Nhập mật khẩu" />
        <span id="passwordError" class="error-text"></span>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Xác nhận mật khẩu</label>
        <input
          type="password"
          id="confirmPassword"
          placeholder="Nhập lại mật khẩu"
        />
        <span id="confirmPasswordError" class="error-text"></span>
      </div>

      <div class="form-group">
        <label>Giới tính</label>
        <input type="radio" name="gender" value="Nam" id="genderNam" />
        <label for="genderNam" style="display: inline; font-weight: normal"
          >Nam</label
        >
        <input type="radio" name="gender" value="Nữ" id="genderNu" />
        <label for="genderNu" style="display: inline; font-weight: normal"
          >Nữ</label
        >
        <input type="radio" name="gender" value="Khác" id="genderKhac" />
        <label for="genderKhac" style="display: inline; font-weight: normal"
          >Khác</label
        >
        <span id="genderError" class="error-text"></span>
      </div>

      <div class="form-group">
        <input type="checkbox" id="terms" />
        <label for="terms" style="display: inline; font-weight: normal"
          >Tôi đồng ý với các điều khoản</label
        >
        <span id="termsError" class="error-text" style="display: block"></span>
      </div>

      <button type="submit">Đăng ký</button>
    </form>

    <script>
      const nameRegex = /^[a-zA-ZÀ-ỹ\s]+$/;
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const phoneRegex = /^0[0-9]{9}$/;
      const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

      function showError(fieldId, errorId, message) {
        const field = document.getElementById(fieldId);
        const errorSpan = document.getElementById(errorId);
        if (field) {
          field.classList.add("input-error");
          field.classList.remove("input-success");
        }
        errorSpan.textContent = message;
        errorSpan.style.display = "block";
      }

      function clearError(fieldId, errorId) {
        const field = document.getElementById(fieldId);
        const errorSpan = document.getElementById(errorId);
        if (field) {
          field.classList.remove("input-error");
          field.classList.add("input-success");
        }
        errorSpan.textContent = "";
        errorSpan.style.display = "none";
      }

      function clearVisualSuccess(fieldId) {
        const field = document.getElementById(fieldId);
        if (field) field.classList.remove("input-success");
      }

      // Các hàm validate từng trường
      function validateFullname() {
        const val = document.getElementById("fullname").value.trim();
        if (val === "") {
          showError("fullname", "fullnameError", "Họ tên không được để trống.");
          return false;
        } else if (val.length < 3) {
          showError(
            "fullname",
            "fullnameError",
            "Họ tên phải từ 3 ký tự trở lên.",
          );
          return false;
        } else if (!nameRegex.test(val)) {
          showError(
            "fullname",
            "fullnameError",
            "Họ tên chỉ chứa chữ cái và khoảng trắng.",
          );
          return false;
        }
        clearError("fullname", "fullnameError");
        return true;
      }

      function validateEmail() {
        const val = document.getElementById("email").value.trim();
        if (val === "") {
          showError("email", "emailError", "Email không được để trống.");
          return false;
        } else if (!emailRegex.test(val)) {
          showError(
            "email",
            "emailError",
            "Email sai định dạng (vd: name@domain.com).",
          );
          return false;
        }
        clearError("email", "emailError");
        return true;
      }

      function validatePhone() {
        const val = document.getElementById("phone").value.trim();
        if (val === "") {
          showError(
            "phone",
            "phoneError",
            "Số điện thoại không được để trống.",
          );
          return false;
        } else if (!phoneRegex.test(val)) {
          showError(
            "phone",
            "phoneError",
            "SĐT phải có 10 chữ số và bắt đầu bằng số 0.",
          );
          return false;
        }
        clearError("phone", "phoneError");
        return true;
      }

      function validatePassword() {
        const val = document.getElementById("password").value;
        if (val === "") {
          showError(
            "password",
            "passwordError",
            "Mật khẩu không được để trống.",
          );
          return false;
        } else if (!passwordRegex.test(val)) {
          showError(
            "password",
            "passwordError",
            "Mật khẩu ≥ 8 ký tự, ít nhất 1 chữ hoa, 1 chữ thường, 1 số.",
          );
          return false;
        }
        clearError("password", "passwordError");

        const confirmVal = document.getElementById("confirmPassword").value;
        if (confirmVal !== "") validateConfirmPassword();

        return true;
      }

      function validateConfirmPassword() {
        const pass = document.getElementById("password").value;
        const confirmPass = document.getElementById("confirmPassword").value;
        if (confirmPass === "") {
          showError(
            "confirmPassword",
            "confirmPasswordError",
            "Vui lòng xác nhận mật khẩu.",
          );
          return false;
        } else if (pass !== confirmPass) {
          showError(
            "confirmPassword",
            "confirmPasswordError",
            "Mật khẩu xác nhận không khớp.",
          );
          return false;
        }
        clearError("confirmPassword", "confirmPasswordError");
        return true;
      }

      function validateGender() {
        const genders = document.getElementsByName("gender");
        let isChecked = false;
        for (let i = 0; i < genders.length; i++) {
          if (genders[i].checked) isChecked = true;
        }
        if (!isChecked) {
          showError(null, "genderError", "Vui lòng chọn giới tính.");
          return false;
        }
        clearError(null, "genderError");
        return true;
      }

      function validateTerms() {
        const terms = document.getElementById("terms");
        if (!terms.checked) {
          showError(null, "termsError", "Vui lòng đồng ý với điều khoản.");
          return false;
        }
        clearError(null, "termsError");
        return true;
      }

      const fields = [
        { id: "fullname", validator: validateFullname, errId: "fullnameError" },
        { id: "email", validator: validateEmail, errId: "emailError" },
        { id: "phone", validator: validatePhone, errId: "phoneError" },
        { id: "password", validator: validatePassword, errId: "passwordError" },
        {
          id: "confirmPassword",
          validator: validateConfirmPassword,
          errId: "confirmPasswordError",
        },
      ];

      fields.forEach((f) => {
        const el = document.getElementById(f.id);

        el.addEventListener("blur", f.validator);

        el.addEventListener("input", function () {
          document.getElementById(f.errId).style.display = "none";
          el.classList.remove("input-error");
          clearVisualSuccess(f.id);
        });
      });

      const genders = document.getElementsByName("gender");
      genders.forEach((g) => g.addEventListener("change", validateGender));
      document
        .getElementById("terms")
        .addEventListener("change", validateTerms);

      document
        .getElementById("registerForm")
        .addEventListener("submit", function (event) {
          event.preventDefault();

          const isValid =
            validateFullname() &
            validateEmail() &
            validatePhone() &
            validatePassword() &
            validateConfirmPassword() &
            validateGender() &
            validateTerms();

          if (isValid) {
            document.getElementById("registerForm").style.display = "none";
            document.getElementById("formTitle").style.display = "none";
            document.getElementById("successMessage").style.display = "block";
            document.getElementById("registeredName").textContent =
              "Xin chào, " + document.getElementById("fullname").value + "!";
          }
        });
    </script>
  </body>
</html>
